<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Fetcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 30px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        #statusText {
            font-size: 0.95em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            min-height: 20px;
        }

        #jokeText {
            font-size: 1.2em;
            color: #333;
            line-height: 1.6;
            font-style: italic;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }

            #jokeText {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Fetcher</h1>
        <button id="jokeBtn">Get a Joke</button>
        <p id="statusText"></p>
        <p id="jokeText"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
